services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - repair_data:/app/data
    environment:
      - PORT=8080
      - DB_PATH=/app/data/repair.db
      - SECRET_KEY=change-me-in-production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/login"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  repair_data:
    driver: local
