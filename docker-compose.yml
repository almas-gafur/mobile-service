services:
  postgres:
    image: postgres:16-alpine
    container_name: repair-crm-postgres
    environment:
      POSTGRES_DB: repair_crm
      POSTGRES_USER: repair
      POSTGRES_PASSWORD: repair
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U repair -d repair_crm"]
      interval: 5s
      timeout: 3s
      retries: 20
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: repair-crm-backend
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: "postgres://repair:repair@postgres:5432/repair_crm?sslmode=disable"
      JWT_SECRET: "replace-this-secret-in-production"
      CORS_ALLOWED_ORIGIN: "*"
      DEFAULT_WORKSHOP_ID: "1"
      GOMEMLIMIT: "460MiB"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 512m
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8080/api"
    container_name: repair-crm-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    mem_limit: 256m
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
