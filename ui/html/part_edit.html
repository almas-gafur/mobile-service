
{{define "title"}}Редактировать запчасть — Xmobile{{end}}

{{define "content"}}
{{with .Data}}
<div class="max-w-xl mx-auto">
    <div class="mb-6 flex items-center gap-3">
        <a href="/parts" class="text-gray-500 hover:text-gray-300 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <h1 class="text-2xl font-bold text-white">Редактировать запчасть</h1>
    </div>

    <div class="card p-7">
        <form method="POST" action="/parts/{{.ID}}/edit" class="space-y-5">
            <div>
                <label class="form-label">Название запчасти <span class="text-red-500">*</span></label>
                <input type="text" name="name" id="part_name" required class="form-input" value="{{.Name}}">
            </div>
            <div class="grid grid-cols-2 gap-5">
                <div>
                    <label class="form-label">Количество на складе</label>
                    <input type="number" name="quantity" id="part_qty" min="0" value="{{.Quantity}}" class="form-input">
                </div>
                <div>
                    <label class="form-label">Цена закупки (₸)</label>
                    <input type="number" name="purchase_price" id="part_price" min="0" step="100" value="{{printf "%.0f" .PurchasePrice}}" class="form-input">
                </div>
            </div>
            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="btn-primary">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Сохранить изменения
                </button>
                <a href="/parts" class="btn-ghost">Отмена</a>
            </div>
        </form>
    </div>
</div>
{{end}}
{{end}}
