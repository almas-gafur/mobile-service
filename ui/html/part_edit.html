{{define "title"}}Редактировать запчасть — Xmobile{{end}}

{{define "content"}}
<div class="max-w-2xl mx-auto">
    <div class="mb-6 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="/parts" class="text-gray-500 hover:text-gray-300 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </a>
            <h1 class="text-2xl font-bold text-white">Редактирование запчасти</h1>
        </div>
        
        <form method="POST" action="/parts/{{.Data.Part.ID}}/delete" onsubmit="return confirm('Вы уверены, что хотите удалить эту запчасть? Это действие нельзя отменить.')">
            <button type="submit" class="text-red-400 hover:text-red-300 transition-colors flex items-center gap-2 text-sm font-medium px-3 py-2 bg-red-400/10 hover:bg-red-400/20 rounded-lg">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                Удалить
            </button>
        </form>
    </div>

    <div class="card p-7">
        {{with .Data}}
        <form method="POST" action="/parts/{{.Part.ID}}/edit" class="space-y-5">
            <div class="grid grid-cols-2 gap-5">
                <div>
                    <label class="form-label">Название запчасти <span class="text-red-500">*</span></label>
                    <input type="text" name="name" required class="form-input" value="{{.Part.Name}}">
                </div>
                <div>
                    <label class="form-label">Артикул (SKU)</label>
                    <input type="text" name="sku" class="form-input" value="{{.Part.SKU}}">
                </div>
            </div>

            <div>
                <label class="form-label">Категория</label>
                <select name="category_id" class="form-input">
                    <option value="">Без категории</option>
                    {{range .Categories}}
                    <option value="{{.ID}}" {{if eq $.Data.Part.CategoryName .Name}}selected{{end}}>{{.Name}}</option>
                    {{end}}
                </select>
            </div>

            <div>
                <label class="form-label">Совместимые модели устройств</label>
                <div class="bg-gray-950 border border-gray-700 rounded-xl max-h-48 overflow-y-auto p-2">
                    {{range .Models}}
                    <label class="flex items-center gap-3 px-3 py-2 hover:bg-gray-800 rounded-lg cursor-pointer transition-colors">
                        <!-- Use map SelectedModels to check if checked -->
                        {{$checked := index $.Data.SelectedModels .ID}}
                        <input type="checkbox" name="models" value="{{.ID}}" {{if $checked}}checked{{end}} class="w-4 h-4 text-blue-600 bg-gray-900 border-gray-700 rounded focus:ring-blue-500 focus:ring-offset-gray-900">
                        <span class="text-sm text-gray-300">{{.Name}}</span>
                    </label>
                    {{else}}
                    <div class="p-3 text-sm text-gray-500">Нет доступных моделей</div>
                    {{end}}
                </div>
            </div>

            <div class="grid grid-cols-3 gap-5">
                <div>
                    <label class="form-label">Кол-во на складе</label>
                    <input type="number" name="quantity" min="0" value="{{.Part.Quantity}}" class="form-input">
                </div>
                <div>
                    <label class="form-label">Цена закупки (₸)</label>
                    <input type="number" name="purchase_price" min="0" step="100" value="{{.Part.PurchasePrice}}" class="form-input">
                </div>
                <div>
                    <label class="form-label">Цена продажи (₸)</label>
                    <input type="number" name="sell_price" min="0" step="100" value="{{.Part.SellPrice}}" class="form-input">
                </div>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="btn-primary">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Сохранить изменения
                </button>
                <a href="/parts" class="btn-ghost">Отмена</a>
            </div>
        </form>
        {{end}}
    </div>
</div>
{{end}}
