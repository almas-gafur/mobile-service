{{define "title"}}Категории запчастей — Xmobile{{end}}

{{define "content"}}
<div class="max-w-4xl mx-auto">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-bold text-white mb-2">Категории запчастей</h1>
            <p class="text-gray-400">Управление категориями для склада</p>
        </div>
    </div>

    <!-- Add Form -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6 mb-8 shadow-xl">
        <form method="POST" action="/categories/new" class="flex gap-4 items-end">
            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-300 mb-2">Название категории</label>
                <input type="text" name="name" required class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-2.5 text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>
            <button type="submit" class="bg-blue-600 hover:bg-blue-500 text-white font-medium py-2.5 px-6 rounded-xl transition-colors">
                Добавить
            </button>
        </form>
    </div>

    <!-- List -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden shadow-xl">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-gray-950/50 border-b border-gray-800">
                    <th class="px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">ID</th>
                    <th class="px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Название</th>
                    <th class="px-6 py-4 text-xs font-semibold text-gray-400 uppercase tracking-wider text-right">Действия</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-800">
                {{range .Data}}
                <tr class="hover:bg-gray-800/50 transition-colors group">
                    <td class="px-6 py-4 text-gray-400">#{{.ID}}</td>
                    <td class="px-6 py-4 font-medium text-white">{{.Name}}</td>
                    <td class="px-6 py-4 text-right">
                        <form method="POST" action="/categories/{{.ID}}/delete" class="inline" onsubmit="return confirm('Вы уверены? Это действие может повлиять на запчасти в этой категории.')">
                            <button type="submit" class="text-gray-500 hover:text-red-400 transition-colors p-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                            </button>
                        </form>
                    </td>
                </tr>
                {{else}}
                <tr>
                    <td colspan="3" class="px-6 py-8 text-center text-gray-500">Нет категорий</td>
                </tr>
                {{end}}
            </tbody>
        </table>
    </div>
</div>
{{end}}
