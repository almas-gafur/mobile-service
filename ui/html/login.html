
{{define "title"}}Вход — RepairCRM{{end}}

{{define "content"}}
<div class="min-h-screen bg-gray-950 flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-blue-600 rounded-2xl mb-4 shadow-lg shadow-blue-900/40">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white">RepairCRM</h1>
            <p class="text-gray-500 text-sm mt-1">Сервисный центр по ремонту телефонов</p>
        </div>

        <div class="bg-gray-900 border border-gray-800 rounded-2xl p-7 shadow-xl">
            <h2 class="text-lg font-semibold text-white mb-5">Вход в систему</h2>

            {{if .Data}}{{with .Data}}
            {{if .Error}}
            <div class="bg-red-900/30 border border-red-700/50 text-red-300 rounded-lg px-4 py-3 mb-5 text-sm flex items-center gap-2">
                <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                {{.Error}}
            </div>
            {{end}}
            {{end}}{{end}}

            <form method="POST" action="/login" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5">Логин</label>
                    <input type="text" name="username" id="username" required autocomplete="username"
                        class="form-input" placeholder="admin">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1.5">Пароль</label>
                    <input type="password" name="password" id="password" required autocomplete="current-password"
                        class="form-input" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary w-full mt-2">
                    Войти
                </button>
            </form>
        </div>

        <p class="text-center text-xs text-gray-600 mt-6">
            admin / admin123 &nbsp;·&nbsp; master / master123
        </p>
    </div>
</div>
{{end}}
