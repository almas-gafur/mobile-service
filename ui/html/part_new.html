{{define "title"}}Новая запчасть — Xmobile{{end}}

{{define "content"}}
<div class="max-w-2xl mx-auto">
    <div class="mb-6 flex items-center gap-3">
        <a href="/parts" class="text-gray-500 hover:text-gray-300 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <h1 class="text-2xl font-bold text-white">Добавить запчасть</h1>
    </div>

    <div class="card p-7">
        {{if .Data}}{{with .Data}}
        {{if .Error}}
        <div class="bg-red-900/30 border border-red-700/50 text-red-300 rounded-lg px-4 py-3 mb-5 text-sm flex items-center gap-2">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            {{.Error}}
        </div>
        {{end}}

        <form method="POST" action="/parts/new" class="space-y-5">
            <div class="grid grid-cols-2 gap-5">
                <div>
                    <label class="form-label">Название запчасти <span class="text-red-500">*</span></label>
                    <input type="text" name="name" required class="form-input" placeholder="Дисплей">
                </div>
                <div>
                    <label class="form-label">Артикул (SKU)</label>
                    <input type="text" name="sku" class="form-input" placeholder="SP-12345">
                </div>
            </div>

            <div>
                <label class="form-label">Категория</label>
                <select name="category_id" class="form-input">
                    <option value="">Без категории</option>
                    {{range .Categories}}
                    <option value="{{.ID}}">{{.Name}}</option>
                    {{end}}
                </select>
            </div>

            <div>
                <label class="form-label">Совместимые модели устройств</label>
                <div class="bg-gray-950 border border-gray-700 rounded-xl max-h-48 overflow-y-auto p-2">
                    {{range .Models}}
                    <label class="flex items-center gap-3 px-3 py-2 hover:bg-gray-800 rounded-lg cursor-pointer transition-colors">
                        <input type="checkbox" name="models" value="{{.ID}}" class="w-4 h-4 text-blue-600 bg-gray-900 border-gray-700 rounded focus:ring-blue-500 focus:ring-offset-gray-900">
                        <span class="text-sm text-gray-300">{{.Name}}</span>
                    </label>
                    {{else}}
                    <div class="p-3 text-sm text-gray-500">Нет доступных моделей</div>
                    {{end}}
                </div>
            </div>

            <div class="grid grid-cols-3 gap-5">
                <div>
                    <label class="form-label">Кол-во на складе</label>
                    <input type="number" name="quantity" min="0" value="0" class="form-input">
                </div>
                <div>
                    <label class="form-label">Цена закупки (₸)</label>
                    <input type="number" name="purchase_price" min="0" step="100" value="0" class="form-input">
                </div>
                <div>
                    <label class="form-label">Цена продажи (₸)</label>
                    <input type="number" name="sell_price" min="0" step="100" value="0" class="form-input">
                </div>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="btn-primary">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Сохранить
                </button>
                <a href="/parts" class="btn-ghost">Отмена</a>
            </div>
        </form>
        {{end}}{{end}}
    </div>
</div>
{{end}}
