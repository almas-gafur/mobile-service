
{{define "title"}}Новый заказ — Xmobile{{end}}

{{define "content"}}
<div class="max-w-2xl mx-auto">
    <div class="mb-6 flex items-center gap-3">
        <a href="/" class="text-gray-500 hover:text-gray-300 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </a>
        <h1 class="text-2xl font-bold text-white">Новый заказ</h1>
    </div>

    <div class="card p-7">
        {{if .Data}}{{with .Data}}
        {{if .Error}}
        <div class="bg-red-900/30 border border-red-700/50 text-red-300 rounded-lg px-4 py-3 mb-5 text-sm flex items-center gap-2">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            {{.Error}}
        </div>
        {{end}}
        {{end}}{{end}}

        <form method="POST" action="/orders/new" class="space-y-5">
            <div class="grid grid-cols-2 gap-5">
                <div>
                    <label class="form-label">Имя клиента <span class="text-red-500">*</span></label>
                    <input type="text" name="client_name" id="client_name" required class="form-input" placeholder="Иван Иванов">
                </div>
                <div>
                    <label class="form-label">Номер телефона <span class="text-red-500">*</span></label>
                    <input type="tel" name="phone" id="phone" required class="form-input" placeholder="+7 700 000 00 00">
                </div>
            </div>

            <div>
                <label class="form-label">Модель устройства <span class="text-red-500">*</span></label>
                <input type="text" name="device" id="device" required class="form-input" placeholder="Xiaomi Redmi Note 11">
            </div>

            <div>
                <label class="form-label">Описание неисправности</label>
                <textarea name="description" id="description" rows="3" class="form-input resize-none" placeholder="Не включается, разбит экран…"></textarea>
            </div>

            <div>
                <label class="form-label">Предварительная стоимость (₸)</label>
                <input type="number" name="estimated_cost" id="estimated_cost" min="0" step="100" class="form-input" placeholder="5000">
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="btn-primary">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                    Принять заказ
                </button>
                <a href="/" class="btn-ghost">Отмена</a>
            </div>
        </form>
    </div>
</div>
{{end}}
